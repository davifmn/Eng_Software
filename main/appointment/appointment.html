<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro de Horários</title>
    <link rel="stylesheet" href="appointment.css">
</head>
<body>
    <header class="header">
        <h2>Selecione um Horário</h2>
        <button id="btnBack">Voltar</button>
    </header>

    <main class="main-container">
        <div class="board-card">
            <div id="boardContainer" class="board-grid">
                <!-- Preenchido via JavaScript -->
            </div>
            <button id="btnConfirm" class="btn-confirm" disabled>Confirmar Agendamento</button>
        </div>
    </main>

    <!-- Usando module para poder importar classes -->
    <script type="module" src="appointment.js"></script>
</body>
</html>
